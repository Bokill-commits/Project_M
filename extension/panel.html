<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; font-size: 12px; margin: 0; padding: 10px; background: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #f3f3f3; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
    td { padding: 8px; border-bottom: 1px solid #eee; word-break: break-all; }
    .malicious { color: #d93025; font-weight: bold; background: #fce8e6; }
    .benign { color: #1e8e3e; }
    
    /* 헤더 레이아웃 수정 */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start; 
      padding-bottom: 10px; 
      border-bottom: 1px solid #ccc; 
    }
    .risk-info-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .risk-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; transition: all 0.3s ease; }
    
    /* 블록형 게이지바 스타일 */
    #gauge-container { 
      width: 150px; 
      height: 10px; 
      background: #eee; 
      border: 1px solid #ccc; 
      overflow: hidden; 
      position: relative;
    }
    #gauge-bar { 
      width: 0%; 
      height: 100%; 
      background: #1e8e3e; 
      transition: width 0.3s ease, background-color 0.3s ease;
      /* 10칸 블록 구분선 효과 */
      background-image: linear-gradient(90deg, transparent 85%, rgba(255,255,255,0.4) 85%);
      background-size: 15px 100%;
    }
    #status-text {
      font-size: 10px;
      font-weight: bold;
      color: #1e8e3e;
    }

    /* 제목 스타일 */
    .panel-title {
      display: flex;
      align-items: center;
      margin: 0;
      color: #2a7fe6; /* 원하는 색상으로 변경 */
      font-size: 20px; /* H2 크기 유지 */
    }
    .panel-title img {
      margin-right: 12px; /* 이미지와 텍스트 사이 간격 */
      width: 64px;   /* 이미지 크기 조절 */
      height: 64px;  /* 이미지 크기 조절 */
    }
  </style>
</head>
<body>
  <div class="header">
    <h2 class="panel-title">
      <img src="image128.png" alt="Malware Scanner Icon">
      Malware Scanner Results 🔍
    </h2>
    
    <div class="risk-info-group">
      <div id="page-risk" class="risk-badge">Page Risk: 0.000</div>
      
      <div id="gauge-container">
        <div id="gauge-bar"></div>
      </div>
      
      <div id="status-text">상태: 안전 ✅</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>URL</th>
        <th>Final Score</th>
        <th>ML Score</th>
        <th>H Score</th>
        <th>Verdict</th>
      </tr>
    </thead>
    <tbody id="result-body">
      </tbody>
  </table>
  <script src="panel.js"></script>
</body>
</html>
